<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nexus Mobile v1 | FSC</title>
    
    <!-- CONFIGURACIÓN PWA PARA MÓVIL -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nexus v1">
    <meta name="theme-color" content="#00050a">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #00050a;
            --surface: #00162d;
            --accent: #00e5ff;
        }
        body { 
            background-color: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #f8fafc;
            overscroll-behavior: none;
        }
        .fsc-gradient {
            background: radial-gradient(circle at top right, #002d5a 0%, #00050a 100%);
        }
        .glass-card {
            background: rgba(0, 22, 45, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 229, 255, 0.15);
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .active-tab {
            color: var(--accent) !important;
            background: rgba(0, 229, 255, 0.08);
            box-shadow: inset 0 -2px 0 var(--accent);
        }
        .page { display: none; animation: fadeIn 0.3s ease-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #auth-screen {
            position: fixed; inset: 0; z-index: 9999;
            background: radial-gradient(circle at center, #001f3f, #00050a);
            display: flex; align-items: center; justify-content: center;
        }
        .btn-primary {
            background: var(--accent);
            color: #000;
            font-weight: 800;
        }
        .price-highlight {
            background: rgba(0, 22, 45, 0.9);
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: 8px;
            padding: 2px 6px;
        }
        .col-map-label { 
            font-size: 8px; 
            font-weight: 800; 
            color: #64748b; 
            text-transform: uppercase; 
            margin-bottom: 2px;
            display: block;
        }
        .nav-btn { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="fsc-gradient min-h-screen pb-28">

    <!-- BLOQUEO DE SEGURIDAD -->
    <div id="auth-screen">
        <div class="w-full max-w-sm p-10 text-center space-y-12">
            <div class="relative mx-auto w-24 h-24">
                <div class="absolute inset-0 bg-cyan-500/20 blur-xl rounded-full"></div>
                <div class="relative w-full h-full glass-card rounded-3xl flex items-center justify-center border-cyan-400/30">
                    <i data-lucide="smartphone" class="text-cyan-400 w-12 h-12"></i>
                </div>
            </div>
            <div class="space-y-2">
                <h1 class="text-2xl font-black tracking-tighter text-white uppercase text-center w-full block">NEXUS <span class="text-cyan-400">MOBILE</span></h1>
                <p class="text-[9px] text-cyan-500/60 font-bold uppercase tracking-[0.5em]">Version 1.0 | FSC</p>
            </div>
            <div class="space-y-4">
                <input type="password" id="pin-input" inputmode="numeric" maxlength="4" placeholder="••••" class="w-full bg-black/40 border-2 border-cyan-900/50 rounded-2xl p-6 text-center text-4xl tracking-[0.6em] text-cyan-400 outline-none focus:border-cyan-400 transition-all">
                <button onclick="login()" class="w-full btn-primary py-5 rounded-2xl text-xs uppercase tracking-[0.3em]">Entrar al Sistema</button>
            </div>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="app" class="hidden max-w-lg mx-auto px-5 pt-8">
        
        <header class="py-6 flex justify-between items-center mb-4">
            <div class="space-y-0.5">
                <h2 class="text-lg font-black tracking-tighter text-white uppercase">FONSECA <span class="text-cyan-400">SC</span></h2>
                <p id="current-date" class="text-[8px] font-bold text-slate-500 uppercase tracking-widest"></p>
            </div>
            <div class="glass-card px-4 py-2 rounded-xl text-right border-cyan-400/20">
                <div class="text-white font-black text-sm mono" id="display-tasa">0.00 Bs.</div>
            </div>
        </header>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="glass-card p-3 rounded-2xl flex bg-black/40">
                <button onclick="setCurrency('USD')" id="btn-usd" class="toggle-btn active flex-1 py-2 rounded-lg text-[9px] uppercase font-black transition-all">USD $</button>
                <button onclick="setCurrency('VEF')" id="btn-vef" class="toggle-btn flex-1 py-2 rounded-lg text-[9px] uppercase font-black transition-all">VES Bs</button>
            </div>
            <select id="catFilter" onchange="renderCatalog()" class="glass-card bg-black/40 p-3 rounded-2xl text-[10px] text-cyan-400 outline-none font-bold uppercase"></select>
        </div>

        <!-- PAGINA: CATALOGO -->
        <div id="page-catalog" class="page active">
            <div id="catalog-grid" class="grid grid-cols-2 gap-4 pb-10">
                <div class="col-span-2 text-center py-20">
                    <p class="text-[10px] font-bold text-slate-600 uppercase tracking-widest">Sincronice el Maestro en Ajustes</p>
                </div>
            </div>
        </div>

        <!-- PAGINA: CARRITO -->
        <div id="page-cart" class="page space-y-6">
            <div class="flex justify-between items-center px-1">
                <h3 class="text-[10px] font-black uppercase text-slate-500 tracking-widest">Orden de Entrega</h3>
                <button onclick="resetBudget()" class="text-[9px] text-red-500 font-bold uppercase">Limpiar Todo</button>
            </div>
            
            <div id="cart-items" class="space-y-3"></div>

            <div class="glass-card p-6 rounded-[2rem] space-y-6 shadow-2xl border-cyan-400/20">
                <div class="space-y-4">
                    <div class="relative">
                        <input type="text" id="clientSearch" oninput="searchClientCRM()" placeholder="BUSCAR CLIENTE..." class="w-full bg-black/40 border border-cyan-900/50 rounded-xl p-4 text-xs text-white outline-none focus:border-cyan-400 font-bold uppercase">
                        <div id="crm-suggestions" class="hidden absolute top-full left-0 right-0 mt-2 glass-card rounded-xl border-cyan-500/30 overflow-hidden z-[100] max-h-40 overflow-y-auto"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="new-client-rif" placeholder="RIF/CÉDULA" class="bg-black/20 border border-slate-800 rounded-lg p-3 text-[10px] text-slate-300 outline-none uppercase">
                        <input type="text" id="new-client-dir" placeholder="DIRECCIÓN" class="bg-black/20 border border-slate-800 rounded-lg p-3 text-[10px] text-slate-300 outline-none uppercase">
                    </div>
                </div>
                
                <div class="pt-4 border-t border-cyan-900/30">
                    <div class="text-right w-full">
                        <h2 id="cart-total-main" class="text-3xl font-black text-white">$ 0.00</h2>
                        <p id="cart-total-alt" class="text-[10px] font-bold text-slate-500 mono">0.00 Bs.</p>
                    </div>
                </div>
                
                <button onclick="executeGenerate()" class="w-full btn-primary py-5 rounded-2xl text-xs uppercase tracking-widest flex items-center justify-center gap-3">
                    <i data-lucide="file-text" class="w-4 h-4"></i> Generar Nota
                </button>
            </div>
        </div>

        <!-- PAGINA: HISTORIAL -->
        <div id="page-history" class="page space-y-6">
            <div class="flex justify-between items-center px-1">
                <h3 class="text-[10px] font-black uppercase text-amber-500 tracking-widest">Control de Emisiones</h3>
                <button onclick="exportUpdatedExcel()" class="bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-[8px] px-3 py-2 rounded-lg font-black uppercase">Sincronizar Maestro</button>
            </div>
            <div id="history-container" class="space-y-3 pb-10"></div>
        </div>

        <!-- PAGINA: AJUSTES -->
        <div id="page-settings" class="page space-y-6 pb-10">
            <!-- BOTÓN DE INSTALACIÓN (SOLO VISIBLE SI CHROME LO PERMITE) -->
            <div id="pwa-install-container" class="hidden glass-card p-6 rounded-3xl border-emerald-500/30 space-y-3">
                <p class="text-[9px] font-black text-emerald-400 uppercase tracking-widest">App Lista para Instalar</p>
                <button id="pwa-install-btn" class="w-full bg-emerald-500 text-slate-950 py-4 rounded-2xl font-black text-xs uppercase flex items-center justify-center gap-2">
                    <i data-lucide="download"></i> Instalar Nexus en el Inicio
                </button>
            </div>

            <div class="glass-card p-6 rounded-3xl space-y-6">
                <h3 class="text-[10px] font-black uppercase text-cyan-400 tracking-widest text-center">Configuración de Columnas</h3>
                
                <input type="file" id="excelInput" class="hidden" accept=".xlsx,.xls">
                <button onclick="document.getElementById('excelInput').click()" class="w-full border-2 border-dashed border-cyan-900/50 p-6 rounded-2xl flex flex-col items-center gap-2 bg-cyan-950/10 active:bg-cyan-500/10">
                    <i data-lucide="upload" class="text-cyan-900 w-6 h-6"></i>
                    <span id="excelStatus" class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Subir Maestro (.xlsx)</span>
                </button>

                <div id="mapping-area" class="hidden space-y-4 pt-4 border-t border-cyan-900/30">
                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-0.5">
                            <label class="col-map-label">1. SKU / Código</label>
                            <select id="col-id" class="col-map w-full bg-black/40 border border-cyan-900/30 rounded-lg p-2 text-[10px] text-white outline-none"></select>
                        </div>
                        <div class="space-y-0.5">
                            <label class="col-map-label">2. Nombre Artículo</label>
                            <select id="col-name" class="col-map w-full bg-black/40 border border-cyan-900/30 rounded-lg p-2 text-[10px] text-white outline-none"></select>
                        </div>
                        <div class="space-y-0.5">
                            <label class="col-map-label">3. Marca</label>
                            <select id="col-brand" class="col-map w-full bg-black/40 border border-cyan-900/30 rounded-lg p-2 text-[10px] text-white outline-none"></select>
                        </div>
                        <div class="space-y-0.5">
                            <label class="col-map-label">4. Categoría</label>
                            <select id="col-cat" class="col-map w-full bg-black/40 border border-cyan-900/30 rounded-lg p-2 text-[10px] text-white outline-none"></select>
                        </div>
                        <div class="space-y-0.5">
                            <label class="col-map-label text-cyan-400 font-black">8. Precio Oferta $</label>
                            <select id="col-oferta" class="col-map w-full bg-cyan-950/40 border border-cyan-400/50 rounded-lg p-2 text-[10px] text-white outline-none font-bold"></select>
                        </div>
                        <div class="space-y-0.5">
                            <label class="col-map-label text-amber-500 font-black">9. Precio Ref $</label>
                            <select id="col-referencia" class="col-map w-full bg-cyan-950/40 border border-cyan-400/50 rounded-lg p-2 text-[10px] text-white outline-none font-bold"></select>
                        </div>
                        <div class="space-y-0.5">
                            <label class="col-map-label">10. Empresa</label>
                            <select id="col-company" class="col-map w-full bg-black/40 border border-cyan-900/30 rounded-lg p-2 text-[10px] text-white outline-none"></select>
                        </div>
                        <div class="space-y-0.5">
                            <label class="col-map-label text-emerald-500 font-black">11. Tasa BCV</label>
                            <select id="col-tasa" class="col-map w-full bg-black/40 border border-cyan-900/30 rounded-lg p-2 text-[10px] text-white outline-none font-bold"></select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="glass-card p-6 rounded-3xl space-y-3">
                <h3 class="text-[10px] font-black uppercase text-amber-500 tracking-widest">Información de Pago</h3>
                <textarea id="config-pagos" class="w-full bg-black/40 border border-slate-800 rounded-2xl p-4 text-[10px] h-24 text-slate-400 font-bold" placeholder="Datos de Pago..."></textarea>
            </div>
        </div>

        <!-- NAVBAR -->
        <nav class="fixed bottom-0 left-0 right-0 h-20 glass-card flex items-center justify-around px-4 z-[999] border-t border-cyan-400/20">
            <button onclick="changePage('catalog', this)" class="nav-btn p-4 active-tab"><i data-lucide="grid" class="w-5 h-5"></i></button>
            <button onclick="changePage('cart', this)" class="nav-btn p-4 text-slate-600 relative">
                <i data-lucide="shopping-cart" class="w-5 h-5"></i>
                <span id="cart-badge" class="hidden absolute top-2 right-2 w-3.5 h-3.5 bg-cyan-400 text-[8px] font-black flex items-center justify-center rounded-full text-black">0</span>
            </button>
            <button onclick="changePage('history', this)" class="nav-btn p-4 text-slate-600"><i data-lucide="history" class="w-5 h-5"></i></button>
            <button onclick="changePage('settings', this)" class="nav-btn p-4 text-slate-600"><i data-lucide="settings" class="w-6 h-6"></i></button>
        </nav>

    </div>

    <script>
        const PIN_MASTER = "2026";
        let masterItems = [], masterClients = [], masterReports = [], budgetHistory = [], cart = [];
        let selectedClient = null, currentCurrency = 'USD', currentTasa = 1.0, workbook = null;

        // --- MANEJO DE INSTALACIÓN PWA ---
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('pwa-install-container').classList.remove('hidden');
        });

        document.getElementById('pwa-install-btn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('pwa-install-container').classList.add('hidden');
                }
                deferredPrompt = null;
            }
        });

        function login() {
            if(document.getElementById('pin-input').value === PIN_MASTER) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
                lucide.createIcons();
            } else { document.getElementById('pin-input').value = ''; }
        }

        document.getElementById('current-date').textContent = new Date().toLocaleDateString('es-VE', { weekday: 'short', day: 'numeric', month: 'short' });

        function changePage(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${pageId}`).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => { b.classList.remove('active-tab'); b.classList.add('text-slate-600'); });
            btn.classList.add('active-tab'); btn.classList.remove('text-slate-600');
            if(pageId === 'history') renderHistory();
        }

        function setCurrency(curr) {
            currentCurrency = curr;
            document.getElementById('btn-usd').classList.toggle('active', curr === 'USD');
            document.getElementById('btn-vef').classList.toggle('active', curr === 'VEF');
            renderCatalog(); updateCartUI();
        }

        document.getElementById('excelInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = new Uint8Array(ev.target.result);
                workbook = XLSX.read(data, {type: 'array'});
                loadSelectedSheets();
                document.getElementById('mapping-area').classList.remove('hidden');
                document.getElementById('excelStatus').textContent = "✓ SISTEMA SINCRONIZADO";
            };
            reader.readAsArrayBuffer(file);
        });

        function loadSelectedSheets() {
            const iSheet = workbook.SheetNames.find(n => n.toUpperCase().includes('INVENTARIO')) || workbook.SheetNames[0];
            const cSheet = workbook.SheetNames.find(n => n.toUpperCase().includes('CLIENTES')) || workbook.SheetNames[1];
            const rSheet = workbook.SheetNames.find(n => n.toUpperCase().includes('REPORTES'));
            const itemsRows = XLSX.utils.sheet_to_json(workbook.Sheets[iSheet], {header: 1});
            const clientRows = XLSX.utils.sheet_to_json(workbook.Sheets[cSheet], {header: 1});
            if(itemsRows.length > 0) { setupColumnMapping(itemsRows[0]); masterItems = itemsRows.slice(1); }
            if(clientRows.length > 0) {
                masterClients = clientRows.slice(1).map(row => ({ id: row[0], name: row[1], rif: row[2], dir: row[6], type: row[7] }));
            }
            if(rSheet) masterReports = XLSX.utils.sheet_to_json(workbook.Sheets[rSheet]);
            processTasa(); updateCategories(); renderCatalog();
        }

        function setupColumnMapping(headers) {
            document.querySelectorAll('.col-map').forEach(sel => {
                sel.innerHTML = headers.map((h, i) => `<option value="${i}">${h || `Col ${i+1}`}</option>`).join('');
                if(sel.id === 'col-id') sel.value = 0; if(sel.id === 'col-name') sel.value = 1; if(sel.id === 'col-brand') sel.value = 2;
                if(sel.id === 'col-cat') sel.value = 3; if(sel.id === 'col-oferta') sel.value = 7; if(sel.id === 'col-referencia') sel.value = 8;
                if(sel.id === 'col-company') sel.value = 9; if(sel.id === 'col-tasa') sel.value = 10;
                sel.onchange = () => { processTasa(); updateCategories(); renderCatalog(); };
            });
        }

        function processTasa() {
            const tIdx = parseInt(document.getElementById('col-tasa').value);
            if (masterItems.length > 0) {
                currentTasa = parseFloat(masterItems[0][tIdx]) || 1.0;
                document.getElementById('display-tasa').textContent = `${currentTasa.toFixed(2)} Bs.`;
            }
        }

        function updateCategories() {
            const cIdx = parseInt(document.getElementById('col-cat').value);
            const cats = [...new Set(masterItems.map(item => item[cIdx] || 'Gral'))].sort();
            document.getElementById('catFilter').innerHTML = '<option value="Todos">-- GRUPOS --</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        function renderCatalog() {
            const grid = document.getElementById('catalog-grid'); grid.innerHTML = '';
            if (masterItems.length === 0) return;
            const selCat = document.getElementById('catFilter').value;
            const c = { id: parseInt(document.getElementById('col-id').value), n: parseInt(document.getElementById('col-name').value), cat: parseInt(document.getElementById('col-cat').value), o: parseInt(document.getElementById('col-oferta').value), r: parseInt(document.getElementById('col-referencia').value), b: parseInt(document.getElementById('col-brand').value) };
            masterItems.forEach((item, index) => {
                if(selCat !== 'Todos' && item[c.cat] !== selCat) return;
                const pO = parseFloat(item[c.o]) || 0, pR = parseFloat(item[c.r]) || 0;
                const card = document.createElement('div');
                card.className = "glass-card p-4 rounded-[1.5rem] flex flex-col justify-between border-cyan-900/20";
                card.innerHTML = `<div class="space-y-1.5 mb-3"><h4 class="text-[10px] font-black leading-tight text-white uppercase h-8 overflow-hidden">${item[c.n]}</h4><p class="text-[7px] text-cyan-500/60 font-bold uppercase">${item[c.b] || ''}</p></div><div class="pt-2 border-t border-cyan-900/30 flex justify-between items-center"><div class="space-y-0.5"><p class="text-[10px] mono ${currentCurrency === 'USD' ? 'price-highlight font-bold' : 'text-slate-600'}">$${pO.toFixed(2)}</p><p class="text-[9px] mono ${currentCurrency === 'VEF' ? 'price-highlight font-bold' : 'text-slate-600'}">Ref$${pR.toFixed(2)}</p></div><button onclick="addToCart(${index})" class="btn-primary p-2 rounded-lg active:scale-90 transition-all"><i data-lucide="plus" class="w-3.5 h-3.5"></i></button></div>`;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        function addToCart(index) {
            const item = masterItems[index];
            const c = { n: parseInt(document.getElementById('col-name').value), o: parseInt(document.getElementById('col-oferta').value), r: parseInt(document.getElementById('col-referencia').value) };
            cart.push({ name: item[c.n], pO: parseFloat(item[c.o]) || 0, pR: parseFloat(item[c.r]) || 0, qty: 1 });
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items'); container.innerHTML = '';
            let tO = 0, tRBs = 0, tRUsd = 0;
            cart.forEach((item, i) => {
                tO += item.pO * item.qty; tRUsd += item.pR * item.qty; tRBs += item.pR * currentTasa * item.qty;
                const showP = currentCurrency === 'USD' ? item.pO : item.pR * currentTasa;
                const div = document.createElement('div');
                div.className = "glass-card p-3 rounded-xl flex justify-between items-center border-cyan-900/40";
                div.innerHTML = `<div class="flex-1"><p class="text-[9px] font-bold text-white uppercase truncate w-32">${item.name}</p><p class="text-[8px] text-cyan-400 mono">${currentCurrency === 'USD' ? '$' : 'Bs.'} ${showP.toFixed(2)}</p></div><div class="flex items-center gap-2"><button onclick="cart.splice(${i}, 1); updateCartUI();" class="text-slate-600 p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button><input type="number" value="${item.qty}" onchange="cart[${i}].qty = Math.max(1, parseInt(this.value)); updateCartUI();" class="w-10 bg-black/40 border border-cyan-900 rounded p-1 text-center text-[10px] text-cyan-400 outline-none mono font-bold"></div>`;
                container.appendChild(div);
            });
            document.getElementById('cart-badge').textContent = cart.length;
            document.getElementById('cart-badge').classList.toggle('hidden', cart.length === 0);
            const main = currentCurrency === 'USD' ? tO : tRBs, alt = currentCurrency === 'USD' ? tRBs : tRUsd;
            document.getElementById('cart-total-main').textContent = `${currentCurrency === 'USD' ? '$' : 'Bs.'} ${main.toLocaleString('es-VE', {minimumFractionDigits: 2})}`;
            document.getElementById('cart-total-alt').textContent = `${alt.toLocaleString('es-VE', {minimumFractionDigits: 2})} ${currentCurrency === 'USD' ? 'Bs.' : '$'}`;
            lucide.createIcons();
        }

        function searchClientCRM() {
            const q = document.getElementById('clientSearch').value.toLowerCase();
            const sugg = document.getElementById('crm-suggestions');
            if(q.length < 2) { sugg.classList.add('hidden'); return; }
            const filtered = masterClients.filter(c => c.name?.toLowerCase().includes(q) || c.rif?.toLowerCase().includes(q));
            if(filtered.length > 0) {
                sugg.innerHTML = filtered.map(c => `<div onclick="selectClient('${c.rif}')" class="p-4 border-b border-cyan-900/30 cursor-pointer hover:bg-cyan-400/5 transition-colors"><p class="text-[9px] font-black text-white uppercase">${c.name}</p><p class="text-[7px] text-cyan-500 uppercase mono">${c.rif}</p></div>`).join('');
                sugg.classList.remove('hidden');
            } else { sugg.classList.add('hidden'); selectedClient = null; }
        }

        function selectClient(rif) {
            selectedClient = masterClients.find(c => c.rif === rif);
            document.getElementById('clientSearch').value = selectedClient.name;
            document.getElementById('crm-suggestions').classList.add('hidden');
            document.getElementById('new-client-rif').value = selectedClient.rif;
            document.getElementById('new-client-dir').value = selectedClient.dir || '';
        }

        function resetBudget() { cart = []; selectedClient = null; document.getElementById('clientSearch').value = ''; document.getElementById('new-client-rif').value = ''; document.getElementById('new-client-dir').value = ''; updateCartUI(); }

        function renderHistory() {
            const container = document.getElementById('history-container');
            if(budgetHistory.length === 0) { container.innerHTML = '<p class="text-center py-20 text-slate-600 text-[8px] font-black uppercase">Sin registros</p>'; return; }
            container.innerHTML = budgetHistory.map(h => `<div class="glass-card p-4 rounded-2xl border-l-4 border-cyan-400 flex justify-between items-center"><div class="space-y-0.5"><p class="text-[6px] text-slate-500 font-black uppercase">${h.date} | ${h.control}</p><p class="text-[10px] font-black text-white uppercase">${h.client}</p><p class="text-[8px] text-cyan-500 mono font-bold">${h.total}</p></div><i data-lucide="check" class="w-4 h-4 text-emerald-400"></i></div>`).join('');
            lucide.createIcons();
        }

        async function exportUpdatedExcel() {
            const newWb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(newWb, workbook.Sheets[document.getElementById('sheet-items')?.value || workbook.SheetNames[0]], "INVENTARIO");
            const cSheet = XLSX.utils.aoa_to_sheet([["ID","NOMBRE","RIF","DIR","TIPO"], ...masterClients.map(c => [c.id, c.name, c.rif, c.dir, c.type])]);
            XLSX.utils.book_append_sheet(newWb, cSheet, "CLIENTES");
            const rSheet = XLSX.utils.aoa_to_sheet([["FECHA","CLIENTE","PRODUCTO","CANTIDAD","MONTO TOTAL"], ...masterReports.map(r => [r.FECHA, r.CLIENTE, r.PRODUCTO, r.CANTIDAD, r.MONTO_TOTAL])]);
            XLSX.utils.book_append_sheet(newWb, rSheet, "REPORTES");
            XLSX.writeFile(newWb, `Nexus_Sync_${Date.now()}.xlsx`);
        }

        async function executeGenerate() {
            if(cart.length === 0) return;
            const cName = document.getElementById('clientSearch').value.toUpperCase(), cRif = document.getElementById('new-client-rif').value.toUpperCase(), cDir = document.getElementById('new-client-dir').value.toUpperCase();
            if(!selectedClient) masterClients.push({ id: 'CL-'+Date.now(), name: cName, rif: cRif, dir: cDir, type: 'DETAL' });
            const dateStr = new Date().toLocaleDateString(), tSum = currentCurrency === 'USD' ? cart.reduce((acc, it) => acc + (it.pO*it.qty), 0) : cart.reduce((acc, it) => acc + (it.pR*currentTasa*it.qty), 0);
            const totalStr = `${currentCurrency === 'USD' ? '$' : 'Bs.'} ${tSum.toLocaleString('es-VE', {minimumFractionDigits: 2})}`;
            cart.forEach(it => { masterReports.push({ FECHA: dateStr, CLIENTE: cName, PRODUCTO: it.name, CANTIDAD: it.qty, MONTO_TOTAL: totalStr }); });
            generateNexusPDF(cName, cRif, cDir, totalStr);
        }

        async function generateNexusPDF(cName, cRif, cDir, totalStr) {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            const coIdx = parseInt(document.getElementById('col-company').value);
            const empresa = masterItems.length > 0 ? masterItems[0][coIdx] : "FONSECA SOLUCIONES COMERCIALES";
            const controlNum = "FSC-" + Math.floor(100000 + Math.random() * 900000);
            doc.setFillColor(0, 5, 10); doc.rect(0, 0, 210, 45, 'F'); doc.setFont("helvetica", "bold"); doc.setFontSize(28); doc.setTextColor(0, 229, 255); doc.text("FSC", 15, 28);
            doc.setFontSize(9); doc.setTextColor(150); doc.text("NOTA DE ENTREGA", 42, 22); doc.text(`ID: ${controlNum}`, 42, 28);
            doc.setFontSize(8); doc.setTextColor(255); doc.text(`EMISOR: ${empresa.toUpperCase()}`, 15, 38);
            doc.setFillColor(245, 245, 245); doc.rect(15, 52, 180, 25, 'F'); doc.setFontSize(10); doc.setTextColor(0, 10, 26); doc.text(`CLIENTE: ${cName}`, 20, 60);
            doc.setFontSize(8); doc.setTextColor(100); doc.text(`RIF: ${cRif}  |  DIR: ${cDir}`, 20, 66); doc.text(`TASA: ${currentTasa.toFixed(2)} Bs/$`, 20, 72);
            let headers = currentCurrency === 'USD' ? [['CANT', 'ARTÍCULO', 'UNIT ($)', 'TOTAL ($)']] : [['CANT', 'ARTÍCULO', 'REF ($)', 'BS', 'TOTAL (BS)']];
            let rows = cart.map(it => {
                if(currentCurrency === 'USD') return [it.qty, it.name, `$${it.pO.toFixed(2)}`, `$${(it.pO*it.qty).toFixed(2)}`];
                const pB = it.pR * currentTasa; return [it.qty, it.name, `$${it.pR.toFixed(2)}`, `${pB.toFixed(2)}`, `${(pB*it.qty).toFixed(2)}`];
            });
            doc.autoTable({ startY: 82, head: headers, body: rows, headStyles: { fillColor: [0, 22, 45], textColor: [0, 229, 255] }, styles: { fontSize: 8 } });
            doc.setFontSize(14); doc.setFont("helvetica", "bold"); doc.setTextColor(0, 22, 45);
            doc.text(`TOTAL: ${totalStr}`, 195, doc.lastAutoTable.finalY + 15, { align: "right" });
            budgetHistory.unshift({ control: controlNum, client: cName, total: totalStr, date: dateStr });
            doc.save(`Nota_${controlNum}.pdf`);
        }

        // MANIFIESTO PWA MEJORADO PARA CHROME
        const manifest = {
            "name": "Nexus Mobile FSC",
            "short_name": "Nexus",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#00050a",
            "theme_color": "#00e5ff",
            "description": "Sistema Móvil de Ingeniería Comercial Fonseca",
            "icons": [{ "src": "https://cdn-icons-png.flaticon.com/512/2991/2991148.png", "sizes": "512x512", "type": "image/png", "purpose": "any maskable" }]
        };
        const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blob);
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = manifestURL;
        document.head.appendChild(link);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript,' + encodeURIComponent('self.addEventListener("fetch", (e) => { e.respondWith(fetch(e.request)); });'));
        }
    </script>
</body>
</html>
